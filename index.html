<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Core Store — AI Assistant Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0A0A0A;
  --ink2:#1A1A1A;
  --gold:#C9A84C;
  --gold2:#E8C96A;
  --gold-light:#FFF8E7;
  --gold-dim:rgba(201,168,76,0.12);
  --white:#FFFFFF;
  --off:#F8F6F1;
  --muted:#6B6456;
  --border:rgba(201,168,76,0.2);
  --border2:rgba(201,168,76,0.35);
}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--ink);
  font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;
  position:relative;
}

/* ── HEADER ── */
header{
  background:var(--ink2);
  border-bottom:1px solid var(--border);
  padding:0.9rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;z-index:10;
}
.logo{display:flex;align-items:center;gap:0.7rem;}
.logo-icon{
  width:38px;height:38px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),#A07830);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
  box-shadow:0 4px 14px rgba(201,168,76,0.3);
}
.logo-name{
  font-family:'Syne',sans-serif;
  font-size:1.3rem;font-weight:800;
  color:var(--white);letter-spacing:-0.5px;
}
.logo-name span{color:var(--gold);}
.header-badge{
  display:flex;align-items:center;gap:0.5rem;
  background:rgba(201,168,76,0.08);
  border:1px solid var(--border);
  border-radius:100px;padding:0.35rem 0.9rem;
}
.badge-dot{
  width:7px;height:7px;border-radius:50%;
  background:#4ade80;
  box-shadow:0 0 0 0 rgba(74,222,128,0.4);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(74,222,128,0.4)}
  70%{box-shadow:0 0 0 6px rgba(74,222,128,0)}
  100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}
}
.badge-txt{font-size:0.72rem;font-weight:600;color:var(--gold2);letter-spacing:0.5px;}

/* ── POWERED BY BANNER ── */
.powered{
  background:linear-gradient(90deg,var(--gold-dim),rgba(201,168,76,0.06),var(--gold-dim));
  border-bottom:1px solid var(--border);
  padding:0.45rem 1.5rem;
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  flex-shrink:0;
}
.powered-txt{font-size:0.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.powered-brand{font-size:0.7rem;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}

/* ── PRODUCT CARDS STRIP ── */
.products{
  padding:1rem 1.5rem;
  display:flex;gap:0.75rem;overflow-x:auto;
  flex-shrink:0;scrollbar-width:none;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.products::-webkit-scrollbar{display:none;}
.prod-card{
  flex-shrink:0;background:var(--ink2);
  border:1px solid var(--border);border-radius:12px;
  padding:0.75rem 1rem;
  display:flex;align-items:center;gap:0.7rem;
  cursor:pointer;transition:all 0.2s;
  min-width:fit-content;
}
.prod-card:hover{border-color:var(--gold);background:var(--gold-dim);}
.prod-emoji{font-size:1.2rem;}
.prod-info{}
.prod-name{font-size:0.78rem;font-weight:600;color:var(--white);line-height:1;}
.prod-price{font-size:0.68rem;color:var(--gold);font-weight:500;margin-top:0.2rem;}

/* ── CHAT AREA ── */
.chat-wrap{
  flex:1;overflow-y:auto;
  padding:1.2rem 1.2rem 0.5rem;
  display:flex;flex-direction:column;gap:0.9rem;
  scroll-behavior:smooth;
}
.chat-wrap::-webkit-scrollbar{width:3px;}
.chat-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.msg{display:flex;gap:0.6rem;align-items:flex-end;animation:msgIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.user{flex-direction:row-reverse;}

.av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:700;
}
.msg.bot .av{
  background:linear-gradient(135deg,var(--gold),#A07830);
  color:var(--ink);font-size:0.85rem;
}
.msg.user .av{background:#2A2A2A;color:var(--muted);}

.bub{
  max-width:78%;padding:0.75rem 1rem;
  font-size:0.9rem;line-height:1.65;word-wrap:break-word;
}
.msg.bot .bub{
  background:var(--ink2);color:var(--white);
  border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;
}
.msg.user .bub{
  background:linear-gradient(135deg,var(--gold),#A07830);
  color:var(--ink);font-weight:500;
  border-radius:16px 4px 16px 16px;
}

/* Typing indicator */
.typing{display:flex;gap:5px;align-items:center;padding:0.85rem 1rem;}
.typing span{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);opacity:0.4;
  animation:typ 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes typ{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}

/* ── QUICK REPLIES ── */
.qr-wrap{
  padding:0.6rem 1.2rem;
  display:flex;gap:0.5rem;flex-wrap:wrap;
  flex-shrink:0;
}
.qr{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--gold2);
  padding:0.45rem 0.95rem;border-radius:100px;
  font-size:0.78rem;font-weight:500;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.qr:hover{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:600;}

/* ── INPUT AREA ── */
.input-wrap{
  padding:0.9rem 1.2rem;
  border-top:1px solid var(--border);
  display:flex;gap:0.6rem;align-items:flex-end;
  flex-shrink:0;background:var(--ink2);
}
#inp{
  flex:1;background:var(--ink);
  border:1px solid var(--border);border-radius:12px;
  padding:0.75rem 1rem;
  color:var(--white);font-family:'DM Sans',sans-serif;
  font-size:0.9rem;outline:none;resize:none;
  line-height:1.5;max-height:100px;
  transition:border-color 0.2s;
}
#inp::placeholder{color:var(--muted);}
#inp:focus{border-color:var(--gold);}
#send{
  width:42px;height:42px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),#A07830);
  border:none;border-radius:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
  box-shadow:0 4px 12px rgba(201,168,76,0.3);
}
#send:hover{transform:scale(1.05);box-shadow:0 6px 18px rgba(201,168,76,0.4);}
#send:disabled{background:#2A2A2A;cursor:not-allowed;transform:none;box-shadow:none;}
#send svg{width:18px;height:18px;fill:var(--ink);}

/* ── ZANA BADGE BOTTOM ── */
.zana-badge{
  text-align:center;padding:0.5rem;
  font-size:0.65rem;color:var(--muted);
  flex-shrink:0;background:var(--ink2);
}
.zana-badge strong{color:var(--gold);}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">👑</div>
    <div class="logo-name">Core <span>Store</span></div>
  </div>
  <div class="header-badge">
    <div class="badge-dot"></div>
    <span class="badge-txt">AI Assistant Online</span>
  </div>
</header>

<!-- POWERED BY -->
<div class="powered">
  <span class="powered-txt">Powered by</span>
  <span class="powered-brand">⚡ Zana AI</span>
  <span class="powered-txt">· Your Business. Always Working.</span>
</div>

<!-- PRODUCT CARDS -->
<div class="products">
  <div class="prod-card" onclick="askAbout('Tell me about your watches')">
    <div class="prod-emoji">⌚</div>
    <div class="prod-info">
      <div class="prod-name">Watches</div>
      <div class="prod-price">From KSh 4,000</div>
    </div>
  </div>
  <div class="prod-card" onclick="askAbout('Tell me about your laptops')">
    <div class="prod-emoji">💻</div>
    <div class="prod-info">
      <div class="prod-name">Laptops</div>
      <div class="prod-price">From KSh 25,000</div>
    </div>
  </div>
  <div class="prod-card" onclick="askAbout('Tell me about your shoes')">
    <div class="prod-emoji">👟</div>
    <div class="prod-info">
      <div class="prod-name">Shoes</div>
      <div class="prod-price">From KSh 5,000</div>
    </div>
  </div>
  <div class="prod-card" onclick="askAbout('Do you deliver nationwide?')">
    <div class="prod-emoji">🚚</div>
    <div class="prod-info">
      <div class="prod-name">Delivery</div>
      <div class="prod-price">Nationwide</div>
    </div>
  </div>
  <div class="prod-card" onclick="askAbout('Where are you located?')">
    <div class="prod-emoji">📍</div>
    <div class="prod-info">
      <div class="prod-name">Location</div>
      <div class="prod-price">Nairobi CBD</div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div class="chat-wrap" id="chat"></div>

<!-- QUICK REPLIES -->
<div class="qr-wrap" id="qr"></div>

<!-- INPUT -->
<div class="input-wrap">
  <textarea id="inp" rows="1" placeholder="Ask Core Store anything..." onkeydown="onKey(event)" oninput="resize(this)"></textarea>
  <button id="send" onclick="send()">
    <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
  </button>
</div>

<!-- ZANA BADGE -->
<div class="zana-badge">AI Assistant by <strong>Zana AI</strong> · antiquevaultke@gmail.com</div>

<script>
const SYSTEM = `You are the Core Store AI assistant — a friendly, knowledgeable sales assistant for Core Store, a premium retail shop based in Nairobi CBD, Kenya.

ABOUT CORE STORE:
- Name: Core Store
- Location: Nairobi CBD, Kenya
- Products: Watches, Laptops, Shoes
- Delivery: Nationwide across Kenya
- You can also visit in-store at Nairobi CBD

PRODUCTS & PRICING:
Watches:
- Price range: From KSh 4,000
- Premium timepieces for every style and budget
- Brands available in store

Laptops:
- Price range: From KSh 25,000
- Wide range of laptops for students, professionals and gamers
- New and certified refurbished options available

Shoes:
- Price range: From KSh 5,000
- Sneakers, formal and casual shoes
- Multiple brands and sizes available

DELIVERY:
- Nationwide delivery across all 47 counties in Kenya
- Nairobi same-day delivery available
- Secure packaging for all electronics

YOUR PERSONALITY:
- Warm, friendly and helpful — like a real shop assistant
- Use natural Kenyan English — casual but professional
- Use emojis sparingly but naturally
- Always end with a question or clear next step
- If someone wants to buy, ask for their location for delivery or invite them to the CBD store
- Keep replies concise — 2-4 sentences max
- Never make up prices beyond what's listed — say "prices vary by model, come in or DM us for exact pricing"

You represent Core Store professionally. Help customers find what they need and guide them toward a purchase or store visit.`;

let history = [];
let busy = false;

const quickReplies = [
  "What watches do you have?",
  "Laptop prices?", 
  "Do you deliver to Mombasa?",
  "What shoe brands?",
  "How do I order?"
];

function showQR() {
  const el = document.getElementById('qr');
  el.innerHTML = '';
  quickReplies.forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr';
    b.textContent = q;
    b.onclick = () => { el.innerHTML = ''; send(q); };
    el.appendChild(b);
  });
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const w = document.createElement('div');
  w.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = role === 'bot' ? '👑' : 'U';
  const b = document.createElement('div');
  b.className = 'bub';
  b.textContent = text;
  w.appendChild(av);
  w.appendChild(b);
  chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
  history.push({ role: role === 'bot' ? 'assistant' : 'user', content: text });
}

function showTyping() {
  const chat = document.getElementById('chat');
  const w = document.createElement('div');
  w.className = 'msg bot'; w.id = 'typing';
  const av = document.createElement('div');
  av.className = 'av'; av.textContent = '👑';
  const b = document.createElement('div');
  b.className = 'bub';
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  w.appendChild(av); w.appendChild(b);
  chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function askAbout(q) {
  document.getElementById('qr').innerHTML = '';
  send(q);
}

async function send(text) {
  const inp = document.getElementById('inp');
  const msg = text || inp.value.trim();
  if (!msg || busy) return;
  inp.value = ''; resize(inp);
  document.getElementById('qr').innerHTML = '';
  addMsg('user', msg);
  busy = true;
  document.getElementById('send').disabled = true;
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history.filter(m => m.role !== 'assistant' || history.indexOf(m) > history.length - 12)
          .slice(-10)
          .filter(m => m.content !== msg || m.role !== 'user' || history.filter(x => x.content === msg && x.role === 'user').indexOf(m) === 0)
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content && data.content[0] ? data.content[0].text : "Asante! Please contact us directly: +254 799 278 741 😊";
    addMsg('bot', reply);
  } catch {
    removeTyping();
    addMsg('bot', "Oops! Connection issue. Reach us directly: +254 799 278 741 📱");
  }

  busy = false;
  document.getElementById('send').disabled = false;
  document.getElementById('inp').focus();
  showQR();
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    addMsg('bot', "Habari! 👋 Welcome to Core Store — your go-to shop for watches, laptops and shoes in Nairobi CBD. We deliver nationwide across Kenya! What are you looking for today?");
    setTimeout(showQR, 600);
  }, 600);
});
</script>
</body>
</html>
