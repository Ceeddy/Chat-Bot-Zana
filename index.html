<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Core Store — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#16A34A;--green-soft:#DCFCE7;--green-mid:#86EFAC;
  --ink:#0F0F0F;--muted:#888;--muted2:#BBB;
  --border:rgba(0,0,0,0.07);--white:#FFFFFF;--off:#FAFAFA;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--white);overflow:hidden;}
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.blob1{width:420px;height:420px;background:radial-gradient(circle,rgba(134,239,172,0.35),rgba(22,163,74,0.1),transparent 70%);top:-120px;right:-80px;}
.blob2{width:350px;height:350px;background:radial-gradient(circle,rgba(134,239,172,0.2),rgba(187,247,208,0.15),transparent 70%);bottom:-100px;left:-80px;}
.blob3{width:200px;height:200px;background:radial-gradient(circle,rgba(220,252,231,0.6),transparent 70%);top:40%;left:50%;transform:translate(-50%,-50%);}
.page{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
header{padding:1.2rem 1.4rem 0.8rem;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.brand-name{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:var(--ink);letter-spacing:-0.5px;line-height:1;}
.brand-name em{font-style:italic;font-weight:300;color:var(--green);}
.brand-sub{font-size:0.7rem;color:var(--muted);margin-top:0.2rem;}
.status-pill{display:flex;align-items:center;gap:0.4rem;background:var(--green-soft);border-radius:100px;padding:0.35rem 0.8rem;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,0.4)}70%{box-shadow:0 0 0 5px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
.status-txt{font-size:0.68rem;font-weight:600;color:var(--green);}
.divider{height:1px;background:var(--border);margin:0 1.4rem;flex-shrink:0;}
.chat{flex:1;overflow-y:auto;padding:1rem 1.4rem 0.5rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:0;}
.msg{display:flex;gap:0.6rem;align-items:flex-end;animation:fadeUp 0.4s cubic-bezier(0.34,1.4,0.64,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.user{flex-direction:row-reverse;}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;}
.msg.bot .av{background:linear-gradient(135deg,var(--green-soft),var(--green-mid));color:var(--green);font-size:0.9rem;border:1px solid rgba(22,163,74,0.2);}
.msg.user .av{background:var(--ink);color:white;font-size:0.65rem;}
.bub{max-width:76%;padding:0.75rem 1rem;font-size:0.88rem;line-height:1.65;word-wrap:break-word;}
.msg.bot .bub{background:var(--white);color:var(--ink);border-radius:4px 16px 16px 16px;box-shadow:0 2px 16px rgba(0,0,0,0.07),0 0 0 1px var(--border);}
.msg.user .bub{background:var(--ink);color:var(--white);border-radius:16px 4px 16px 16px;}
.typing-bub{background:var(--white);border-radius:4px 16px 16px 16px;box-shadow:0 2px 16px rgba(0,0,0,0.07),0 0 0 1px var(--border);padding:0.85rem 1.1rem;display:flex;gap:5px;align-items:center;}
.typing-bub span{width:6px;height:6px;border-radius:50%;background:var(--muted2);animation:typ 1.2s infinite;}
.typing-bub span:nth-child(2){animation-delay:0.18s;}
.typing-bub span:nth-child(3){animation-delay:0.36s;}
@keyframes typ{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}
.qr-wrap{padding:0.5rem 1.4rem;display:flex;gap:0.5rem;flex-wrap:wrap;flex-shrink:0;}
.qr{background:var(--white);border:1px solid var(--border);color:var(--ink);padding:0.42rem 0.9rem;border-radius:100px;font-size:0.75rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.qr:hover{background:var(--green);color:white;border-color:var(--green);}
.input-area{padding:0.8rem 1.4rem 1rem;flex-shrink:0;}
.input-box{display:flex;align-items:flex-end;gap:0.6rem;background:var(--off);border:1px solid var(--border);border-radius:16px;padding:0.6rem 0.6rem 0.6rem 1rem;transition:border-color 0.2s,box-shadow 0.2s;}
.input-box:focus-within{border-color:rgba(22,163,74,0.4);box-shadow:0 0 0 3px rgba(22,163,74,0.08);}
#inp{flex:1;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--ink);resize:none;line-height:1.5;max-height:90px;}
#inp::placeholder{color:var(--muted2);}
#send{width:36px;height:36px;flex-shrink:0;background:var(--ink);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
#send:hover{background:var(--green);}
#send:disabled{background:var(--muted2);cursor:not-allowed;}
#send svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2.5;}
.foot{text-align:center;padding:0 1.4rem 0.8rem;flex-shrink:0;}
.foot-txt{font-size:0.62rem;color:var(--muted2);}
.foot-txt strong{color:var(--green);font-weight:600;}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="page">
  <header>
    <div class="brand">
      <div class="brand-name">Core <em>Store</em></div>
      <div class="brand-sub">Nairobi CBD · Watches · Laptops · Shoes</div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span class="status-txt">Online 24/7</span>
    </div>
  </header>
  <div class="divider"></div>
  <div class="chat" id="chat"></div>
  <div class="qr-wrap" id="qr"></div>
  <div class="input-area">
    <div class="input-box">
      <textarea id="inp" rows="1" placeholder="Ask us anything..." onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button id="send" onclick="send()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
  <div class="foot"><div class="foot-txt">AI Assistant by <strong>⚡ Zana AI</strong> · Your Business. Always Working.</div></div>
</div>
<script>
const SYSTEM=`You are the Core Store AI assistant — friendly sales assistant for Core Store, a premium shop in Nairobi CBD, Kenya.
Products: Watches from KSh 4,000 | Laptops from KSh 25,000 | Shoes from KSh 5,000
Delivery: Nationwide across all 47 counties. Same-day in Nairobi.
Style: Warm, concise, natural Kenyan English. 2-3 sentences max. Use emojis naturally. Always end with a next step. If they want to buy, ask for location.`;
let history=[],busy=false;
const QRS=["What watches do you have? ⌚","Laptop options? 💻","Deliver to Mombasa? 🚚","Shoe brands? 👟","How to order? 🛒"];
function showQR(){const el=document.getElementById('qr');el.innerHTML='';QRS.forEach(q=>{const b=document.createElement('button');b.className='qr';b.textContent=q;b.onclick=()=>{el.innerHTML='';send(q);};el.appendChild(b);});}
function addMsg(role,text){const chat=document.getElementById('chat');const w=document.createElement('div');w.className=`msg ${role}`;const av=document.createElement('div');av.className='av';av.textContent=role==='bot'?'✦':'U';const b=document.createElement('div');b.className='bub';b.textContent=text;w.appendChild(av);w.appendChild(b);chat.appendChild(w);chat.scrollTop=chat.scrollHeight;history.push({role:role==='bot'?'assistant':'user',content:text});}
function showTyping(){const chat=document.getElementById('chat');const w=document.createElement('div');w.className='msg bot';w.id='typ';const av=document.createElement('div');av.className='av';av.textContent='✦';const b=document.createElement('div');b.className='typing-bub';b.innerHTML='<span></span><span></span><span></span>';w.appendChild(av);w.appendChild(b);chat.appendChild(w);chat.scrollTop=chat.scrollHeight;}
function removeTyping(){const el=document.getElementById('typ');if(el)el.remove();}
async function send(text){const inp=document.getElementById('inp');const msg=text||inp.value.trim();if(!msg||busy)return;inp.value='';resize(inp);document.getElementById('qr').innerHTML='';addMsg('user',msg);busy=true;document.getElementById('send').disabled=true;showTyping();
try{const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer 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'},body:JSON.stringify({model:'llama-3.1-8b-instant',max_tokens:300,messages:[{role:'system',content:SYSTEM},...history.slice(-10)]})});const data=await res.json();removeTyping();const reply=data.choices?.[0]?.message?.content||"Asante! Reach us: +254 799 278 741 😊";addMsg('bot',reply);}
catch{removeTyping();addMsg('bot',"Connection issue. Contact us: +254 799 278 741 📱");}
busy=false;document.getElementById('send').disabled=false;document.getElementById('inp').focus();showQR();}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}
window.addEventListener('DOMContentLoaded',()=>{setTimeout(()=>{addMsg('bot',"Habari! 👋 Welcome to Core Store — Nairobi's go-to shop for watches, laptops and shoes. We deliver nationwide. What are you looking for today?");setTimeout(showQR,500);},500);});
</script>
</body>
</html>
